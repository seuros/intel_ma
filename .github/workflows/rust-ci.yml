name: rust-ci

on:
  pull_request: {}
  push:
    branches:
      - master
  workflow_dispatch:

# fmt + clippy run locally via pre-commit hooks. CI only runs tests.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: test

      - name: cargo test
        run: cargo test --all-features
        env:
          RUST_BACKTRACE: 1
