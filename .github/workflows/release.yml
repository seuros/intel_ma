name: release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Publish as draft (un-draft manually after smoke testing)"
        type: boolean
        default: true
      prerelease:
        description: "Mark as prerelease"
        type: boolean
        default: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      build_ts: ${{ steps.meta.outputs.build_ts }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          build_ts=$(date -u +%s)
          cargo_version=$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)
          tag_name="v${cargo_version}.${build_ts}"
          echo "build_ts=${build_ts}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "### Release metadata" >> "$GITHUB_STEP_SUMMARY"
          echo "- tag: \`${tag_name}\`" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build — ${{ matrix.os_label }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os_label: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_label: linux-aarch64
          - runner: macos-14
            target: aarch64-apple-darwin
            os_label: macos-aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            os_label: macos-x86_64

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.os_label }}

      - name: Build tarball
        shell: bash
        run: |
          set -euo pipefail
          artifact="intel_ma-${{ needs.prepare.outputs.tag_name }}-${{ matrix.target }}.tar.gz"
          cargo build --release --target "${{ matrix.target }}" --bin intel_ma
          release_dir="target/${{ matrix.target }}/release"
          strip "${release_dir}/intel_ma" 2>/dev/null || true
          tmp=$(mktemp -d)
          cp "${release_dir}/intel_ma" "$tmp/"
          cp README.md "$tmp/"
          tar czf "${artifact}" -C "$tmp" .
          rm -rf "$tmp"
          sha256sum "${artifact}" > "${artifact}.sha256"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.tag_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            intel_ma-${{ needs.prepare.outputs.tag_name }}-${{ matrix.target }}.tar.gz
            intel_ma-${{ needs.prepare.outputs.tag_name }}-${{ matrix.target }}.tar.gz.sha256

  summary:
    name: Release summary
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        shell: bash
        run: |
          echo "build: ${{ needs.build.result }}"
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "One or more build jobs failed."
            exit 1
          fi
          echo "### Release complete" >> "$GITHUB_STEP_SUMMARY"
          echo "tag: \`${{ needs.prepare.outputs.tag_name }}\`" >> "$GITHUB_STEP_SUMMARY"
