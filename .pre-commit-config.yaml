repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all --
        args: ["--check"]
        pass_filenames: false
        types: [rust]
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --all-targets -- -D warnings
        pass_filenames: false
        types: [rust]
      - id: cargo-shear
        name: cargo shear (unused deps)
        language: system
        entry: cargo shear
        pass_filenames: false
        files: Cargo\.(toml|lock)$
